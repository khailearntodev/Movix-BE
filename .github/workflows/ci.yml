name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    # 1. Lấy code về
    - uses: actions/checkout@v4

    # 2. Cài Node.js
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # 3. Cài Dependencies (Quan trọng: npm ci nhanh và chuẩn hơn npm install)
    - name: Install dependencies
      run: npm ci

    # 4. Generate Prisma Client (BẮT BUỘC để build được TypeScript)
    - name: Generate Prisma Client
      run: npx prisma generate

    # 5. Kiểm tra lỗi cú pháp (Lint) - Nếu bạn có script lint trong package.json
    - name: Run Lint
      run: npm run lint
      continue-on-error: true # Cho phép chạy tiếp kể cả khi lint cảnh báo (tùy chọn)

    # 6. Build thử code TypeScript xem có lỗi logic không
    - name: Run Build
      run: npm run build

    # 7. Test xem Docker có build được không (Mô phỏng môi trường Render)
    - name: Test Docker Build
      run: docker build . --file Dockerfile

  # --- PHẦN CD: CHỈ CHẠY KHI CODE ĐÃ ỔN VÀ ĐANG Ở NHÁNH MAIN ---
  deploy:
    needs: build-and-test # Phải đợi job trên xong và thành công mới chạy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
